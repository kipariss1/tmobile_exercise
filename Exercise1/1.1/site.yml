---
- hosts: all
  gather_facts: true

  vars:
    docker_daemon_json_path: /etc/docker/daemon.json

  
  pre_tasks:
    - name: Fail if not Ubuntu
      ansible.builtin.fail:
        msg: >-
          This playbook supports Ubuntu only. Detected:
          ansible_system={{ ansible_system }},
          ansible_distribution={{ ansible_distribution }},
          ansible_distribution_version={{ ansible_distribution_version }}
      when: ansible_distribution != "Ubuntu"


  tasks:
    - name: Install Docker on Ubuntu (apt)
      block:
        - name: Install docker.io
          ansible.builtin.apt:
            name: docker.io
            state: present
            update_cache: true
          become: true

        - name: Enable and start docker service
          ansible.builtin.service:
            name: docker
            state: started
            enabled: true
          become: true

    - name: Ensure /etc/docker exists
      ansible.builtin.file:
        path: /etc/docker
        state: directory
        owner: root
        mode: "0755"
      become: true

    - name: Configure Docker daemon to use syslog logging driver
      ansible.builtin.copy:
        dest: "{{ docker_daemon_json_path }}"
        owner: root
        mode: "0644"
        content: |
          {
            "log-driver": "syslog"
          }
      notify: Restart docker hook
      become: true

    - name: Enable and start Docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

  handlers:
    - name: Restart docker hook
      ansible.builtin.service:
        name: docker
        state: restarted
      become: true